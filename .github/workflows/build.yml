name: Build MinesPlugin

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:  # lets you click "Run workflow" manually too

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn package -B --no-transfer-progress

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: MinesPlugin
          path: target/MinesPlugin-*.jar
          retention-days: 30
